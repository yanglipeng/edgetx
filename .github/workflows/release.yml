---
name: Build and Release on Push
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'release-build-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # X7 Series
          - x7
          - x7access
          - t12
          - tx12
          - tx12mk2
          - gx12
          - boxer
          - t8
          - zorro
          - pocket
          - mt12
          - tlite
          - tpro
          - tprov2
          - tpros
          - bumblebee
          - t20
          - t12max
          - t14
          - t20v2
          - lr3pro
          - commando8
          - v12
          - v14
          # X9 Series
          - xlite
          - xlites
          - x9lite
          - x9lites
          - x9d
          - x9dp
          - x9dp2019
          - x9e
          - x9e-hall
          # X10 Series
          - x10
          - x10express
          - x12s
          - t15
          - t16
          - t18
          - t15pro
          - tx15
          - tx16s
          - tx16smk3
          - f16
          - v16
          # PL18 Series
          - nv14
          - el18
          - pl18
          - pl18ev
          - pl18u
          - nb4p
          # Other
          - st16
          - pa01
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build firmware ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          EXTRA_OPTIONS: "-DTRANSLATIONS=CN"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: ./tools/build-gh.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-firmware-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            *.bin
            *.uf2
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: edgetx-firmware-*
          path: edgetx-firmware
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          name: "EdgeTX Main Build (${{ github.sha }})"
          body: |
            ## EdgeTX Firmware Build

            **Commit:** ${{ github.sha }}
            **Branch:** main

            ### Supported Radios
            #### X7 Series
            x7, x7access, t12, tx12, tx12mk2, gx12, boxer, t8, zorro, pocket, mt12, tlite, tpro, tprov2, tpros, bumblebee, t20, t12max, t14, t20v2, lr3pro, commando8, v12, v14

            #### X9 Series
            xlite, xlites, x9lite, x9lites, x9d, x9dp, x9dp2019, x9e, x9e-hall

            #### X10 Series
            x10, x10express, x12s, t15, t16, t18, t15pro, tx15, tx16s, tx16smk3, f16, v16

            #### PL18 Series
            nv14, el18, pl18, pl18ev, pl18u, nb4p

            #### Other
            st16, pa01

            ### Changes
            This build includes the Smooth Transition feature for F3C flying.
          files: |
            edgetx-firmware/*.bin
            edgetx-firmware/*.uf2
            edgetx-firmware/fw.json
