---
name: Build and Release on Push
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'release-build-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - tx16s
          - tx16smk3
          - v16
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build firmware ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          EXTRA_OPTIONS: "-DTRANSLATIONS=CN"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: ./tools/build-gh.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edgetx-firmware-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            *.bin
            *.uf2
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: edgetx-firmware-*
          path: edgetx-firmware
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          name: "EdgeTX Main Build (${{ github.sha }})"
          body: |
            ## EdgeTX Firmware Build

            **Commit:** ${{ github.sha }}
            **Branch:** main

            ### Supported Radios
            - TX16S
            - TX16S MK3
            - V16 (Helloradiosky)

            ### Changes
            This build includes the Smooth Transition feature for F3C flying.
          files: |
            edgetx-firmware/*.bin
            edgetx-firmware/*.uf2
            edgetx-firmware/fw.json
