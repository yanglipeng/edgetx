---
name: Build and Release on Push
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      targets:
        description: 'Targets to build (comma separated)'
        required: false
        default: 'tx16s,tx16smk3,v16'

concurrency:
  group: 'release-build-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - tx16s
          - tx16smk3
          - v16
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Build firmware ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          EXTRA_OPTIONS: "-DTRANSLATIONS=CN"
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: ./tools/build-gh.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: edgetx-firmware-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            *.bin
            *.uf2
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: always() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    permissions:
      contents: write
    steps:
      - name: Check build results
        run: |
          echo "Checking build results..."
          echo "Build status: ${{ needs.build.result }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        if: needs.build.result == 'success'
        with:
          pattern: edgetx-firmware-*
          path: edgetx-firmware
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "Downloaded files:"
          ls -la edgetx-firmware/ 2>/dev/null || echo "No files downloaded"

      - name: Create Release
        if: needs.build.result == 'success'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: main-${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          name: "EdgeTX Main Build (${{ github.sha }})"
          body: |
            ## EdgeTX Firmware Build

            **Commit:** ${{ github.sha }}
            **Built:** ${{ github.event.head_commit.timestamp }}
            **Branch:** main

            ### Supported Radios
            - TX16S
            - TX16S MK3
            - V16 (Helloradiosky)

            ### Changes
            This build includes the Smooth Transition feature for F3C flying.
          files: |
            edgetx-firmware/*.zip
            edgetx-firmware/*.bin
            edgetx-firmware/*.uf2
            edgetx-firmware/fw.json

      - name: Upload all artifacts as workflow artifacts
        if: needs.build.result == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: all-firmware-builds
          path: edgetx-firmware/
          retention-days: 30

      - name: Report failure
        if: needs.build.result != 'success'
        run: |
          echo "Build failed. Check the build job logs for details."
          echo "Artifacts may be available from the individual build jobs."
