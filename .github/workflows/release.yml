---
name: Build and Release on Push
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: 'release-build'
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - tx16s
          - tx16smk3
          - v16
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build firmware ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          EXTRA_OPTIONS: "-DTRANSLATIONS=CN"
          EDGETX_VERSION_SUFFIX: ""
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: ./tools/build-gh.sh

      - name: Package firmware ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: edgetx-firmware-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            *.bin
            *.uf2
          retention-days: 5
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: edgetx-firmware-*
          path: edgetx-firmware
          merge-multiple: true

      - name: Get version
        id: version
        run: |
          VERSION=$(cat VERSION.txt 2>/dev/null || echo "v2.10.0-dev")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Compose release filename
        run: |
          echo "release_filename=edgetx-firmware-${GITHUB_SHA::8}.zip" >> $GITHUB_ENV
          echo "build_date=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV

      - name: Zip release file
        uses: montudor/action-zip@v1
        with:
          args: zip -qq -j -r ${{ env.release_filename }} ./edgetx-firmware

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}-${{ github.sha }}
          prerelease: true
          name: "${{ steps.version.outputs.version }} (${{ github.sha }})"
          body: |
            ## EdgeTX Firmware Build

            **Commit:** ${{ github.sha }}
            **Built:** ${{ env.build_date }}
            **Branch:** main

            ### Supported Radios
            - TX16S
            - TX16S MK3
            - V16 (Helloradiosky)

            ### Installation
            Download and extract the firmware file for your radio model.

            ### Changes
            This build includes the Smooth Transition feature for F3C flying.
          files: |
            ${{ env.release_filename }}
