---
name: Build and deploy nightly release
on:
  schedule:
    - cron: '0 2 * * *' # run at 2 AM UTC
  workflow_dispatch:

concurrency:
  group: 'nightly'
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - tx16s
          - v16
          - tx16smk3
          - v16
          - pa01
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Test ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: |
          echo "Running commit tests"
          ./tools/commit-tests.sh

  build:
    name: Run builds
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'ci: skip-fw')
    strategy:
      matrix:
        target:
          - tx16s
          - tx16smk3
          - v16
    container:
      image: ghcr.io/edgetx/edgetx-dev:latest
      volumes:
        - ${{ github.workspace }}:/src
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Build ${{ matrix.target }}
        env:
          FLAVOR: ${{ matrix.target }}
          TRANSLATIONS: CN
          CMAKE_BUILD_PARALLEL_LEVEL: 4
        run: |
          echo "Running firmware build"
          ./tools/build-gh.sh

      - name: Upload ${{ matrix.target }}
        uses: actions/upload-artifact@v7
        with:
          name: firmware-${{ matrix.target }}
          path: |
            fw.json
            LICENSE
            *.bin
            *.uf2
          retention-days: 15
          if-no-files-found: error

  package:
    name: Package firmwares
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compose release filename
        run: echo "artifact_name=edgetx-firmware-${GITHUB_REF##*/}" >> $GITHUB_ENV

      - name: Merge firmware artifact packages
        uses: actions/upload-artifact/merge@v7
        with:
          name: "${{ env.artifact_name }}"
          pattern: firmware-*
          delete-merged: true
          retention-days: 15
